{% extends 'base.html' %}
{% load static %}

{% block content %}
<h2>Registro de usuario</h2>
<form method="post">{% csrf_token %}
  {{ form.as_p }}
  <div class="form-check mb-3">
    <input class="form-check-input" type="checkbox" id="showPwd">
    <label class="form-check-label" for="showPwd">Mostrar contraseñas</label>
  </div>
  <button type="submit" class="btn btn-primary">Registrarse</button>
</form>
<script>
  document.getElementById('showPwd').addEventListener('change', function(e){
    const pw = document.querySelectorAll('input[type="password"]');
    pw.forEach(i=> i.type = e.target.checked ? 'text' : 'password');
  });
</script>
{% endblock %}
